spring:
  application:
    name: revenue-sync

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

api:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: 3600000

admin:
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASSWORD}

solana:
  rpc-url: ${HELIUS_RPC_URL:https://api.mainnet-beta.solana.com}
  default-recipient-wallet: ""
  default-expiration-minutes: 15
  max-verifications-per-cycle: 50
  verification-interval-ms: 5000

ml:
  service:
    base-url: ${BASE_URL:http://localhost:8000}
